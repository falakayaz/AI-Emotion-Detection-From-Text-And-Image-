<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #121212;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .tabs {
            display: flex;
            background-color: #1f1f1f;
            border-bottom: 2px solid #ff6700;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            color: #f0f0f0;
            font-weight: bold;
            transition: background 0.3s;
        }
        .tab.active {
            border-bottom: 3px solid #ff6700;
            color: #ff6700;
        }
        .container {
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ffccff;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .input-area, .output-area, .buttons {
            margin: 10px 0;
        }
        textarea {
            width: 100%;
            height: 80px;
            background-color: #1f1f1f;
            color: #f0f0f0;
            border: 1px solid #333;
            padding: 10px;
            resize: none;
        }
        .output-area {
            width: 100%;
            min-height: 50px;
            background-color: #1f1f1f;
            border: 1px solid #333;
            padding: 10px;
            overflow-y: auto;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
        .submit-btn { background-color: #ff6700; color: #fff; }
        .clear-btn { background-color: #555; color: #fff; }
        .flag-btn { background-color: #777; color: #fff; }
        .image-input {
            border: 2px dashed #555;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="openTab('text')">Text Emotion</div>
        <div class="tab" onclick="openTab('image')">Image Emotion</div>
    </div>

    <div class="container">
        <!-- Text Emotion Section -->
        <div id="text" class="section active">
            <h1>🧠 Text Emotion Detector</h1>
            <p>Detect emotions such as anger, sadness, joy, fear, disgust, etc. from text.</p>
            <div class="input-area">
                <textarea id="textInput" placeholder="Type a sentence here..."></textarea>
            </div>
            <div class="buttons">
                <button class="clear-btn" onclick="clearText()">Clear</button>
                <button class="submit-btn" onclick="submitText()">Submit</button>
                <button class="flag-btn" onclick="flagText()">Flag</button>
            </div>
            <div class="output-area" id="textOutput"></div>
        </div>

        <!-- Image Emotion Section -->
        <div id="image" class="section">
            <h1>📸 Image Emotion Detector</h1>
            <p>Upload a human face to detect emotions like happiness, anger, sadness, etc.</p>
            <div class="image-input" onclick="document.getElementById('imageInput').click()">
                Drop Image Here - or - Click to Upload
            </div>
            <input type="file" id="imageInput" style="display:none" onchange="submitImage()">
            <div class="buttons">
                <button class="clear-btn" onclick="clearImage()">Clear</button>
                <button class="submit-btn" onclick="submitImage()">Submit</button>
                <button class="flag-btn" onclick="flagImage()">Flag</button>
            </div>
            <div class="output-area" id="imageOutput"></div>
        </div>
    </div>

    <script>
        function openTab(tabName) {
            // Tabs
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.currentTarget.classList.add('active');
            // Sections
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
        }

        function clearText() {
            document.getElementById('textInput').value = '';
            document.getElementById('textOutput').innerHTML = '';
        }

        function submitText() {
            const text = document.getElementById('textInput').value;
            document.getElementById('textOutput').innerHTML = 'Detected emotion: ' + text; // placeholder
        }

        function flagText() {
            alert('Text flagged!');
        }

        function clearImage() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imageOutput').innerHTML = '';
        }

        function submitImage() {
            const file = document.getElementById('imageInput').files[0];
            if (file) {
                document.getElementById('imageOutput').innerHTML = 'Detected emotion for ' + file.name; // placeholder
            }
        }

        function flagImage() {
            alert('Image flagged!');
        }
    </script>
</body>
</html>
